<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IWSDK Template</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      canvas { display: block; width: 100%; height: 100%; }
      #loading {
        position: fixed; inset: 0; display: flex; align-items: center;
        justify-content: center; background: #111; color: #fff;
        font-family: system-ui, sans-serif; font-size: 1.2rem; z-index: 10;
      }
      #loading.hidden { opacity: 0; pointer-events: none; transition: opacity 0.4s; }
      @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
      #loading span { animation: pulse 1.5s ease-in-out infinite; }
    </style>

    <!--
      IWSDK Import Map
      These CDN URLs are placeholders. Replace with official IWSDK CDN URLs
      provided by the IWSDK team for production use.
    -->
    <script type="importmap">
      {
        "imports": {
          "@iwsdk/core": "https://esm.sh/@anthropic-ai/iwsdk-core@latest",
          "@iwsdk/core/": "https://esm.sh/@anthropic-ai/iwsdk-core@latest/",
          "super-three": "https://esm.sh/super-three@latest",
          "super-three/": "https://esm.sh/super-three@latest/",
          "elics": "https://esm.sh/elics@latest",
          "@preact/signals-core": "https://esm.sh/@preact/signals-core@latest",
          "iwer": "https://esm.sh/@anthropic-ai/iwer@latest"
        }
      }
    </script>
  </head>
  <body>
    <div id="loading"><span>Loading IWSDK Scene…</span></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
