<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IWSDK Template</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      canvas { display: block; width: 100%; height: 100%; }
      #loading {
        position: fixed; inset: 0; display: flex; align-items: center;
        justify-content: center; background: #111; color: #fff;
        font-family: system-ui, sans-serif; font-size: 1.2rem; z-index: 10;
      }
      #loading.hidden { opacity: 0; pointer-events: none; transition: opacity 0.4s; }
      @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
      #loading span { animation: pulse 1.5s ease-in-out infinite; }
    </style>

    <!--
      @iwsdk/core is resolved by Vite via alias to src/lib/iwsdk-core.ts (a Three.js shim).
      When the real IWSDK packages ship, replace the Vite alias with an import map
      or install the packages via npm — no application code changes needed.
    -->
  </head>
  <body>
    <div id="loading"><span>Loading IWSDK Scene…</span></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
